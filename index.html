function openGeneralTaskPicker() {
  if (!S.employees || !S.employees.length) {
    toast("No employees found — load your team first");
    return;
  }
  /* Deduplicate project names: trim + case-insensitive */
  var seen = {};
  var projects = [];
  S.employees.forEach(function(e) {
    var p = (e.projectName || "").trim();
    if (p && !seen[p.toLowerCase()]) { seen[p.toLowerCase()] = true; projects.push(p); }
  });
  /* If only one unique project → skip project picker */
  if (projects.length <= 1) {
    S.generalTargetProject = projects[0] || "all";
    _openGeneralDeptPicker(S.employees);
    return;
  }
  /* Multiple projects — show picker */
  var myProject = S.user ? ((S.user.projectName || "").trim()) : "";
  var projBtns = projects.map(function(p) {
    var isMine = p.toLowerCase() === myProject.toLowerCase();
    return `<button onclick="pickGeneralProject('${esc(p)}')"
      style="display:block;width:100%;margin-bottom:8px;padding:12px 16px;border:1.5px solid #0F6E56;border-radius:8px;background:${isMine?'#0F6E56':'#f0fdf4'};color:${isMine?'#fff':'#0F6E56'};font-size:13px;font-weight:700;cursor:pointer;text-align:left;">
      &#127970; ${esc(p)}${isMine?' &nbsp;<span style="font-size:10px;opacity:.8;">(Your Project)</span>':''}
    </button>`;
  }).join("");
  showOverlay(modal("Assign General Task — Select Project",
    `<p style="font-size:13px;color:#64748b;margin-bottom:12px;">Select which project team should receive this task. Only that project's team will see it.</p>
     ${projBtns}
     <button onclick="pickGeneralProject('all')"
       style="display:block;width:100%;padding:12px 16px;border:1.5px solid #185FA5;border-radius:8px;background:#185FA5;color:#fff;font-size:13px;font-weight:700;cursor:pointer;text-align:left;">
       &#127760; Whole Team &nbsp;<span style="font-size:10px;opacity:.8;">(All projects see this task)</span>
     </button>`,
    `<button class="btn btn-grey" onclick="closeOverlay()">Cancel</button>`
  ));
}

function pickGeneralProject(project) {
  closeOverlay();
  S.generalTargetProject = project;
  /* Filter employees by selected project */
  var filtered = project === "all"
    ? S.employees
    : S.employees.filter(function(e){ return (e.projectName || "").trim().toLowerCase() === project.trim().toLowerCase(); });
  if (!filtered.length) { toast("No team members found for " + project); return; }
  _openGeneralDeptPicker(filtered);
}

function _openGeneralDeptPicker(empList) {
  var depts = [...new Set(empList.map(function(e){ return e.department; }).filter(Boolean))];
  if (depts.length === 1) {
    _openGeneralForDeptFiltered(depts[0], empList);
    return;
  }
  var deptBtns = depts.map(function(d) {
    return `<button class="btn btn-dark" style="margin:5px;padding:10px 16px;font-size:13px;border-radius:8px;width:calc(50% - 10px);" onclick="pickGeneralDept('${esc(d)}')">${esc(d)}</button>`;
  }).join("");
  showOverlay(modal("Select Department",
    `<p style="font-size:13px;color:#64748b;margin-bottom:12px;">Task will be visible to all <b>${esc(S.generalTargetProject === 'all' ? 'team' : S.generalTargetProject)}</b> members in the selected department.</p>
     <div style="display:flex;flex-wrap:wrap;">${deptBtns}</div>`,
    `<button class="btn btn-grey" onclick="closeOverlay()">Cancel</button>`
  ));
}

function pickGeneralDept(dept) {
  closeOverlay();
  var empList = S.generalTargetProject === "all"
    ? S.employees
    : S.employees.filter(function(e){ return (e.projectName || "") === S.generalTargetProject; });
  _openGeneralForDeptFiltered(dept, empList);
}

function _openGeneralForDeptFiltered(dept, empList) {
  var emp = empList.find(function(e){ return e.department === dept; });
  if (!emp) emp = S.employees.find(function(e){ return e.department === dept; });

}

  if (!b) return;

function drawTaskTable(b) {
  const today = new Date().toISOString().split("T")[0];
  const all   = S.tasks.length + S.newTasks.length;

  if (!all) {
    b.innerHTML = `<div class="tt-body"><div class="empty-state" style="background:#fff;border-radius:9px;margin:8px 0;">No tasks yet.<br>Press <strong>+ Upload Task</strong> to add tasks.</div></div>`;
    return;
  }

  function taskCard(t, isNew) {
    const isDone   = t.status === "completed" || t.status === "completed_with_comments";
    const isOverdue = !isDone && t.targetCompletionDate && t.targetCompletionDate < today;
    const srClass  = isNew ? "tc-sr-new" : (isDone ? "tc-sr-done" : "tc-sr-pend");
    const dotColor = isDone ? "#9ca3af" : (isOverdue ? "#b33030" : "#e6c200");
    const statusText = isDone ? "Completed" : (isOverdue ? "Overdue" : "Pending");
    const statusColor = isDone ? "#9ca3af" : (isOverdue ? "#7a1c1c" : "#7d5800");
    const genTag     = t.isGeneral ? `<span class="tc-chip" style="background:#cce5ff;color:#004085;">General</span>` : "";
    const newTag     = isNew ? `<span class="tc-chip" style="background:#fef3c7;color:#92400e;">Unsaved</span>` : "";
    const urgTagCard = t.isHighPriority && !isDone && !isNew ? `<span class="tc-chip" style="background:#fee2e2;color:#991b1b;font-weight:700;">🔴 High Priority</span>` : "";

    const chips = [
      t.assignedDate ? `<span class="tc-chip"><i class="ti ti-calendar-event" aria-hidden="true"></i>${esc(t.assignedDate)} ${esc(t.assignedTime || "")}</span>` : "",
      t.targetCompletionDate ? `<span class="tc-chip" ${isOverdue ? 'style="background:#fde8e8;color:#7a1c1c;"' : ""}><i class="ti ti-alarm" aria-hidden="true"></i>Due: ${esc(t.targetCompletionDate)}</span>` : "",
      t.building ? `<span class="tc-chip"><i class="ti ti-building" aria-hidden="true"></i>${esc(t.building)}${t.floor ? ", F-"+esc(t.floor) : ""}${t.roomNumber ? ", #"+esc(t.roomNumber) : ""}</span>` : "",
      t.taskDept || t.department ? `<span class="tc-chip"><i class="ti ti-folder" aria-hidden="true"></i>${esc(t.taskDept || t.department)}</span>` : "",
      genTag, newTag, urgTagCard,
      isDone && t.completedDate ? `<span class="tc-chip" style="background:#E1F5EE;color:#085041;"><i class="ti ti-circle-check" aria-hidden="true"></i>Done: ${esc(t.completedDate)}</span>` : "",
    ].filter(Boolean).join("");

    const actionBtns = isNew ? "" : (isDone
      ? `<button class="tc-btn tc-btn-view" onclick="viewEmpTaskDetail('${t.id}')">View</button>`
      : `<button class="tc-btn tc-btn-view" onclick="viewEmpTaskDetail('${t.id}')">View</button>
         <button class="tc-btn tc-btn-done" onclick="mgComplete('${t.id}','completed')">✓ Done</button>
         <button class="tc-btn tc-btn-cmt"  onclick="mgCompleteComment('${t.id}')">✓+ Comment</button>`);

    const urgentClass = t.isHighPriority && !isDone && !isNew ? " tc-card-urgent" : "";
    return `<div class="tc-card${isNew ? " new-card" : ""}${urgentClass}${isDone ? '" style="background:#f3f4f6;opacity:0.78;' : ''}">
      <div class="tc-top">
        <div class="tc-title-row">
          <span class="tc-sr ${srClass}">#${t.srNumber}</span>
          <span class="tc-task">${esc(t.taskDescription)}</span>
        </div>
        <div class="tc-chips">${chips}</div>
      </div>
      <div class="tc-bot">
        <span class="tc-status" style="color:${statusColor};">
          <span class="tc-dot" style="background:${dotColor};"></span>${statusText}
        </span>
        <div class="tc-btns">${actionBtns}</div>
      </div>
    </div>`;
  }

  /* Sort: pending newest first, completed newest first at bottom */
  const tcTs   = t => (t.createdAt && t.createdAt.seconds) ? t.createdAt.seconds : (t.srNumber || 0);
  const tcDone = t => (t.completedAt && t.completedAt.seconds) ? t.completedAt.seconds : (t.srNumber || 0);
  const pendTasks = S.tasks.filter(t => t.status === "pending" || t.status === "returned")
    .sort((a,b) => tcTs(b) - tcTs(a));
  const doneTasks = S.tasks.filter(t => t.status !== "pending" && t.status !== "returned")
    .sort((a,b) => tcDone(b) - tcDone(a));

  const pendCards = pendTasks.map(t => taskCard(t, false)).join("");
  const doneCards = doneTasks.length
    ? `<div class="mt-section-hdr" style="margin-top:6px;color:#9ca3af;"><i class="ti ti-circle-check" style="vertical-align:-1px;color:#9ca3af;"></i> Completed &nbsp;(${doneTasks.length}) &nbsp;<span style="font-size:9px;font-weight:400;">— newest first</span></div>`
      + doneTasks.map(t => taskCard(t, false)).join("")
    : "";
  const newCards  = S.newTasks.map(t => taskCard(t, true)).join("");
  const saveBtn   = S.newTasks.length
    ? `<div class="tt-save-strip"><button class="tt-save-btn" onclick="doSaveUpload()">SAVE &amp; UPLOAD (${S.newTasks.length} new task${S.newTasks.length > 1 ? "s" : ""})</button></div>`
    : "";

  b.innerHTML = `<div class="tt-body">${newCards}${pendCards}${doneCards}</div>${saveBtn}`;
  updateEmpStats();
}

/* ════════════════════════════════════════════════════
   PHOTO UPLOAD — compress / store / auto-delete / download
   ════════════════════════════════════════════════════ */
const PH_KEY   = 'dtm_photos_v1';
const PH_TTL   = 3 * 24 * 60 * 60 * 1000;   // 3 days in ms
const PH_MAX   = 2;                           // max photos per slot

function phGenId() { return 'ph_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

function phLoad() {
  try { return JSON.parse(localStorage.getItem(PH_KEY) || '[]'); } catch(e) { return []; }
}
function phSave(arr) { localStorage.setItem(PH_KEY, JSON.stringify(arr)); }

/* Remove photos older than 3 days — call on boot and on view */
function phClean() {
  const now = Date.now();
  const arr = phLoad().filter(p => (now - p.ts) < PH_TTL);
  phSave(arr);
}

function phGetForTask(taskKey, type) {
  phClean();
  return phLoad().filter(p => p.taskKey === taskKey && p.type === type);
}

function phAdd(taskKey, type, base64, filename) {
  const arr = phLoad();
  /* Enforce max 2 per slot */
  const existing = arr.filter(p => p.taskKey === taskKey && p.type === type);
  if (existing.length >= PH_MAX) { toast('Maximum 2 photos allowed'); return null; }
  const rec = { id: phGenId(), taskKey, type, base64, filename, ts: Date.now() };
  arr.push(rec);
  phSave(arr);
  return rec.id;
}

function phDelete(id) {
  phSave(phLoad().filter(p => p.id !== id));
}

/* Compress image via Canvas → JPEG ~70% quality, max 900px wide */
function phCompress(file, cb) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const MAX = 900;
      let w = img.width, h = img.height;
      if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      cb(canvas.toDataURL('image/jpeg', 0.70), file.name);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

/* Trigger browser download of a photo */
function phDownload(base64, filename) {
  const a = document.createElement('a');
  a.href = base64;
  a.download = filename || 'task-photo.jpg';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

/* Auto-download all photos for a task (once opened) */
function phAutoDownload(taskKey, type) {
  const dlKey = 'dtm_phdl_' + taskKey + '_' + type;
  if (localStorage.getItem(dlKey)) return; /* Already downloaded this session */
  const photos = phGetForTask(taskKey, type);
  if (!photos.length) return;
  photos.forEach((p, i) => {
    setTimeout(() => phDownload(p.base64, p.filename || ('task-photo-' + (i+1) + '.jpg')), i * 400);
  });
  localStorage.setItem(dlKey, '1');
}

/* Render photo thumbnails for display (read-only) */
function phThumbsHTML(photos) {
  if (!photos.length) return '<div style="font-size:11px;color:#94a3b8;padding:4px 0;">No photos attached</div>';
  return '<div class="ph-thumbs">' + photos.map(p =>

/* Render interactive photo upload widget */
function phWidgetHTML(taskKey, type, labelText) {
  const photos = phGetForTask(taskKey, type);
  const thumbs = photos.map(p =>
    `<div class="ph-thumb-box">
       <img src="${p.base64}" alt="photo">
       <button class="ph-del" onclick="phDeleteAndRefresh('${p.id}','${taskKey}','${type}','${esc(labelText)}')" title="Remove">&#x2715;</button>
     </div>`
  ).join('');
  const canAdd = photos.length < PH_MAX;
  return `<div class="ph-wrap" id="phw-${taskKey}-${type}">
    <div class="ph-label">&#128247; ${esc(labelText)}</div>
    <div class="ph-thumbs" id="phthumbs-${taskKey}-${type}">${thumbs || '<span style="font-size:11px;color:#94a3b8;">No photos yet</span>'}</div>
    ${canAdd ? `<button class="ph-add-btn" onclick="phTriggerPick('${taskKey}','${type}','${esc(labelText)}')"><i class="ti ti-camera-plus" aria-hidden="true"></i> Add Photo (${photos.length}/${PH_MAX})</button>` : `<div style="font-size:11px;color:#94a3b8;">Max 2 photos reached</div>`}
    <input type="file" id="ph-input-${taskKey}-${type}" accept="image/*" style="display:none" onchange="phHandlePick(this,'${taskKey}','${type}','${esc(labelText)}')">
    <div class="ph-note">&#128460; Image downloaded to your gallery and will be deleted after 3 days</div>
  </div>`;

function phTriggerPick(taskKey, type, label) {
  const inp = document.getElementById('ph-input-' + taskKey + '-' + type);
  if (inp) inp.click();
}

function phHandlePick(input, taskKey, type, label) {
  const file = input.files && input.files[0];
  if (!file) return;
  phCompress(file, (base64, filename) => {
    phAdd(taskKey, type, base64, filename);
    /* Refresh widget in place */
    const wrap = document.getElementById('phw-' + taskKey + '-' + type);
    if (wrap) wrap.outerHTML = phWidgetHTML(taskKey, type, label);
    toast('Photo added ✓');
  });
  input.value = '';
}

function phDeleteAndRefresh(id, taskKey, type, label) {
  phDelete(id);
  const wrap = document.getElementById('phw-' + taskKey + '-' + type);
  if (wrap) wrap.outerHTML = phWidgetHTML(taskKey, type, label);
}

function anGrade(eff) {
  if (eff >= 90) return { letter:'A', title:'Outstanding Performance',   desc:'All tasks completed on time. Excellent commitment and execution.',    bg:'#E1F5EE', txt:'#085041', bar:'#0F6E56' };
  if (eff >= 75) return { letter:'B', title:'Good Performance',          desc:'Above average. Meeting targets and expectations consistently.',       bg:'#E6F1FB', txt:'#0C447C', bar:'#185FA5' };
  if (eff >= 60) return { letter:'C', title:'Needs Improvement',         desc:'Below target. Closer monitoring and coaching required.',              bg:'#FAEEDA', txt:'#633806', bar:'#854F0B' };
  if (eff > 0)   return { letter:'D', title:'Unsatisfactory',            desc:'Very low completion rate. Immediate corrective action needed.',       bg:'#FCEBEB', txt:'#791F1F', bar:'#A32D2D' };
  return               { letter:'D', title:'No Tasks Completed',         desc:'Zero completion. Immediate discussion and action plan required.',     bg:'#FCEBEB', txt:'#791F1F', bar:'#A32D2D' };
}
function anAvatarCol(name) {
  let s = 0; for (const c of (name||'E')) s += c.charCodeAt(0);
  return AN_COLS[s % AN_COLS.length];
}
const AN_SAMPLE_EMPS = []; /* No demo data — real data comes from Firebase */

function pmGetProject() {
  /* Returns the PM's project name from profile or project setup */
  if (S.user && S.user.projectName) return S.user.projectName.toLowerCase().trim();
  try {
    const proj = JSON.parse(localStorage.getItem('dtm_project_v1') || '{}');
    if (proj.projectName) return proj.projectName.toLowerCase().trim();
  } catch(e) {}
  return '';
}

function anGetEmpData() {
  if (FB_OK && S.anData && S.anData.length) {
    if (isPM()) {
      /* PM: show all employees on same project */
      const pmProj = pmGetProject();
      if (pmProj) return S.anData.filter(d => (d.emp||d).projectName && (d.emp||d).projectName.toLowerCase().trim() === pmProj);
      return S.anData;
    }
    return S.anData.filter(d => (d.emp||d).managerEmpNumber === S.user.employmentNumber);
  }
  var allSrc = (S.employees && S.employees.length) ? S.employees : AN_SAMPLE_EMPS;
  var src;
  if (isPM()) {
    /* PM: filter by same project name */
    const pmProj = pmGetProject();
    src = pmProj ? allSrc.filter(function(e){ return e.projectName && e.projectName.toLowerCase().trim() === pmProj; }) : allSrc;
    if (!src.length) src = allSrc; /* fallback: show all if no project match */
  } else {
    src = allSrc;
  }
  return src.map(emp => {
    const total = emp._total || 0, done = emp._done || 0, pend = total - done;
    const eff = total > 0 ? Math.round(done / total * 100) : 0;
    return { emp, total, completed: done, pending: pend, overdue: Math.max(0, Math.floor(pend * 0.3)), efficiency: eff, tasks: anDemoTasks(emp, done, pend) };
  });
}
function anDemoTasks(emp, done, pend) {
  const pool = { Civil:['Structural slab inspection','Concrete pour coordination','Rebar placement check','Backfill compaction report','Quality documentation','Progress photos upload','Weekly site report','Snag list update'], Mechanical:['Chiller room inspection','AHU commissioning check','BMS point verification','Fan coil unit testing','Duct leak test','HVAC balancing report','Equipment schedule update','Shop drawing review'], Plumbing:['Water supply rough-in','Fixture installation','Pressure test doc','Drainage connection','Pipe insulation check','Valve testing report','Snag list closure'], Electrical:['Cable tray installation','Conduit routing','DB board labelling','Earthing continuity test','Electrical inspection','As-built markup','MV cable termination'] };
  const names = pool[emp.department] || pool['Civil'];
  const months = ['Jan','Feb','Mar','Apr','May']; const tasks = []; let day = 10;
  for (let i = 0; i < done; i++) { const m = months[Math.floor(i/2)%5]; tasks.push({ taskName: names[i%names.length], status:'completed', createdAt:`${String(day).padStart(2,'0')} ${m} 2025`, targetDate:`${String(day).padStart(2,'0')} ${m} 2025` }); day = (day+12)%28+1; }
  for (let i = 0; i < pend; i++) { const m = months[(Math.floor(done/2)+i)%5]; tasks.push({ taskName: names[(done+i)%names.length], status:'pending', createdAt:`${String(day).padStart(2,'0')} ${m} 2025`, targetDate:`${String(day).padStart(2,'0')} ${m} 2025` }); day = (day+8)%28+1; }
  return tasks;
}

  if (mgr) { const raw = localStorage.getItem('dtm_ancreds_' + mgr); if (raw) { try { return JSON.parse(raw); } catch(e){} } }
  return { user: CFG.ANALYTICS_USER, pass: CFG.ANALYTICS_PASS };
}

function anLogin() {
  const u = (document.getElementById("an-u")?.value || "").trim();
  const p = (document.getElementById("an-p")?.value || "");
  const creds = anGetStoredCreds();
  if (u === creds.user && p === creds.pass) {
    S.anLoggedIn = true;
    const c = document.getElementById("analytics-body");
    if (c) anRenderTeamList(c);
  } else {
    const err = document.getElementById("an-err");
    if (err) err.style.display = "block";
  }
}

function showChangeAnCreds() {
  showOverlay(modal("🔑 Change Analytics Credentials",
    `<div class="form-group"><label class="form-label">Existing Username</label>
     <input class="form-input" id="acc-ou" type="text" placeholder="Current username" autocomplete="off"></div>
     <div class="form-group"><label class="form-label">New Username</label>
     <input class="form-input" id="acc-nu" type="text" placeholder="New username" autocomplete="off"></div>
     <div class="form-group"><label class="form-label">Existing Password</label>
     <input class="form-input" id="acc-op" type="password" placeholder="Current password"></div>
     <div class="form-group"><label class="form-label">New Password</label>
     <input class="form-input" id="acc-np" type="password" placeholder="New password"></div>
     <div class="form-group"><label class="form-label">Retype New Password</label>
     <input class="form-input" id="acc-rp" type="password" placeholder="Retype new password"></div>
     <div id="acc-err" style="color:#b33030;font-size:12px;display:none;margin-top:4px;"></div>`,
    `<button class="btn btn-grey" onclick="closeOverlay()">Cancel</button>
     <button class="btn btn-dark" onclick="saveAnCreds()">Save &amp; Update</button>`
  ));
  setTimeout(() => document.getElementById("acc-ou")?.focus(), 80);
}

function saveAnCreds() {
  const creds = anGetStoredCreds();
  const ou = (document.getElementById('acc-ou')?.value || '').trim();
  const nu = (document.getElementById('acc-nu')?.value || '').trim();
  const op = document.getElementById('acc-op')?.value || '';
  const np = document.getElementById('acc-np')?.value || '';
  const rp = document.getElementById('acc-rp')?.value || '';
  const err = document.getElementById('acc-err');
  if (ou !== creds.user) { err.textContent='Existing username is incorrect.'; err.style.display='block'; return; }
  if (op !== creds.pass) { err.textContent='Existing password is incorrect.'; err.style.display='block'; return; }
  if (!nu || nu.length < 3) { err.textContent='New username must be at least 3 characters.'; err.style.display='block'; return; }
  if (!np || np.length < 4) { err.textContent='New password must be at least 4 characters.'; err.style.display='block'; return; }
  if (np !== rp) { err.textContent='New passwords do not match.'; err.style.display='block'; return; }
  const mgr = S.user && S.user.employmentNumber;
  if (mgr) localStorage.setItem('dtm_ancreds_' + mgr, JSON.stringify({ user: nu, pass: np }));
  closeOverlay();
  toast('Analytics credentials updated ✓');
}

function anLogout() {
  S.anLoggedIn = false;
  const c = document.getElementById("analytics-body");
  if (c) renderAnalytics(c);
}

async function anRefresh() {
  if (FB_OK) {
    const data = await fsGetAnalytics(S.user.name);
    S.anData = data;
  }
  const c = document.getElementById("analytics-body");
  if (c) anRenderTeamList(c);
}

function anSelRec(el, choice) {
  document.querySelectorAll('.an-rec-btn').forEach(b => b.classList.remove('sel'));

}
function anSaveRec() {
  if (!AN.recChoice) { toast('Please select a recommendation type first'); return; }
  const note = (document.getElementById('an-rec-note')?.value || '').trim();
  /* Persist recommendation under employee number */
  if (AN.selEmpNum) {
    localStorage.setItem('dtm_rec_' + AN.selEmpNum, JSON.stringify({ choice: AN.recChoice, note: note }));
  }
  toast(`Saved: ${AN.recChoice}${note ? ' — "' + note.substring(0,30) + (note.length>30?'…':'') + '"' : ''} ✓`);
}

      <div class="sig-box"><div class="sig-lbl">HR / Authorized</div><div class="sig-space"></div></div>
    </div>
    <div class="footer">Daily Task Manager &nbsp;·&nbsp; DTM-V-01 &nbsp;·&nbsp; ${esc(S.project?.companyName||'IHCC')} &nbsp;·&nbsp; Confidential</div>
  </div></body></html>`;
  const w = window.open('', '_blank', 'width=860,height=1100');
  if (w) { w.document.write(html); w.document.close(); w.focus(); setTimeout(function(){ w.print(); }, 600); }
}

document.addEventListener('DOMContentLoaded', boot);
</script>
